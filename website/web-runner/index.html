<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Query Runner — Bespoke OLAP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4ede0;
      display: flex;
      flex-direction: column;
    }

    nav {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0 1.25rem;
      height: 44px;
      background: rgba(251, 248, 242, 0.95);
      border-bottom: 1px solid rgba(111, 93, 73, 0.16);
      backdrop-filter: blur(8px);
    }
    nav a.back {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6f5d49;
      text-decoration: none;
      letter-spacing: 0.01em;
      opacity: 0.7;
      transition: opacity 0.15s;
    }
    nav a.back:hover { opacity: 1; }
    nav .logo {
      font-size: 0.9rem;
      font-weight: 700;
      color: #31261d;
      text-decoration: none;
      letter-spacing: -0.01em;
    }
    nav .sep {
      color: rgba(111, 93, 73, 0.4);
      font-size: 0.85rem;
    }
    nav .title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1b8d6e;
    }
    nav .spacer { flex: 1; }
    nav .q-links {
      display: flex;
      gap: 0.4rem;
    }
    nav .q-links a {
      font-size: 0.75rem;
      font-weight: 600;
      color: #6f5d49;
      text-decoration: none;
      padding: 0.2rem 0.55rem;
      border-radius: 5px;
      border: 1px solid rgba(111, 93, 73, 0.2);
      background: rgba(255,250,243,0.7);
      transition: background 0.15s, color 0.15s;
    }
    nav .q-links a:hover {
      background: #1b8d6e;
      color: #fff;
      border-color: #1b8d6e;
    }

    .frame-wrap {
      flex: 1 1 auto;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <nav>
    <a class="back" href="../">&#8592; Back</a>
    <span class="sep">/</span>
    <a class="logo" href="../">BespokeOLAP</a>
    <span class="sep">/</span>
    <span class="title">Live Query Runner</span>
    <div class="spacer"></div>
    <div class="q-links">
      <a href="#" onclick="setQuery(1);return false;">Q1</a>
      <a href="#" onclick="setQuery(3);return false;">Q3</a>
      <a href="#" onclick="setQuery(6);return false;">Q6</a>
      <a href="#" onclick="setQuery(12);return false;">Q12</a>
      <a href="#" onclick="setQuery(19);return false;">Q19</a>
    </div>
  </nav>
  <div class="frame-wrap">
    <iframe id="runner-frame"
      title="Live Query Runner"
      allow="same-origin"
    ></iframe>
  </div>

  <script>
    const BASE = 'https://130.83.40.96.sslip.io:80/ui';

    function currentParams() {
      return Object.fromEntries(new URLSearchParams(location.search));
    }

    function buildSrc(overrides) {
      const params = new URLSearchParams({ ...currentParams(), ...overrides });
      return params.size ? `${BASE}?${params}` : BASE;
    }

    function setQuery(q) {
      document.getElementById('runner-frame').src = buildSrc({ q });
    }

    document.getElementById('runner-frame').src = buildSrc({});
  </script>
</body>
</html>
